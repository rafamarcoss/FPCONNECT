server {
    listen 80;
    server_name localhost;

    # Serve the React built files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # Necessary for Client-Side Routing (React Router)
        try_files $uri $uri/ /index.html;
    }

    # Reverse Proxy to the Backend Node.js service
    location /api/ {
        # 'backend' resolves to the docker-compose service name. 
        # Make sure port 3000 matches your Node backend's exposed port.
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Proper IP forwarding headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
